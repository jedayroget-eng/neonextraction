<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Extraction - Portal de Acesso</title>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-magenta: #ff00ea;
            --neon-green: #00ffaa;
            --bg-dark: #02020a;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
            text-transform: uppercase;
        }

        /* Container Principal simulando a interface da imagem */
        .portal-frame {
            position: relative;
            width: 90vw;
            height: 85vh;
            border: 10px solid #1a1a1a;
            border-radius: 20px;
            background: radial-gradient(circle at center, #0a0a25 0%, #000 100%);
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Elementos Decorativos de HUD (Laterais) */
        .hud-element {
            position: absolute;
            font-size: 0.7rem;
            color: var(--neon-cyan);
            opacity: 0.6;
            pointer-events: none;
        }
        .top-left { top: 20px; left: 20px; }
        .top-right { top: 20px; right: 20px; text-align: right; color: var(--neon-green); }
        .bottom-left { bottom: 20px; left: 20px; }

        /* Arte dos Túneis (CSS puro para manter a identidade visual) */
        .tunnel-effect {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* O Drone Centralizado */
        .drone-icon {
            width: 120px;
            height: 80px;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 15px var(--neon-cyan));
            z-index: 5;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Botão Acessar Jogo */
        .access-btn {
            z-index: 10;
            padding: 20px 50px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            background: transparent;
            border: 3px solid var(--neon-magenta);
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 0 20px var(--neon-magenta), inset 0 0 10px var(--neon-magenta);
            transition: all 0.3s ease;
            letter-spacing: 3px;
        }

        .access-btn:hover {
            background: var(--neon-magenta);
            color: #000;
            box-shadow: 0 0 40px var(--neon-magenta);
            transform: scale(1.1);
        }

        /* Títulos */
        .main-title {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 0 0 20px var(--neon-cyan);
            z-index: 5;
        }

        .sub-title {
            font-size: 0.9rem;
            color: var(--neon-magenta);
            margin-bottom: 40px;
            letter-spacing: 5px;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div class="portal-frame">
        <div class="hud-element top-left">
            LINK ESTABLISHED: 0x88BA<br>
            HUD_COMPUTER_ACTIVE<br>
            ENCRYPTION: 128-BIT
        </div>
        <div class="hud-element top-right">
            FIREWALL INTEGRITY: 97%<br>
            STATUS: READY_TO_DIVE
        </div>
        <div class="hud-element bottom-left">
            COORDINATES: 42.75N / 12.00W<br>
            DATA_LOG: COLLECTING...
        </div>

        <h1 class="main-title">NEON EXTRACTION</h1>
        <p class="sub-title">VAULT DIVE PROTOCOL</p>

        <div class="drone-icon">
            <svg viewBox="0 0 60 40" xmlns="http://www.w3.org/2000/svg">
                <path d="M30 5 L55 35 L30 28 L5 35 Z" fill="none" stroke="#00f2ff" stroke-width="2" />
                <circle cx="30" cy="18" r="3" fill="#fff" />
            </svg>
        </div>

        <a href="https://neon-vault-dive.base44.app" class="access-btn">ACESSAR JOGO</a>
    </div>

</body>
</html>
